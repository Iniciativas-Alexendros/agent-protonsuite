version: 2
updates:
- package-ecosystem: npm
  directory: /
  schedule:
    interval: weekly
  cooldown:
    default-days: 7
  open-pull-requests-limit: 1
  groups:
    dev-deps:
      dependency-type: development
    prod-deps:
      dependency-type: production
    all-others:
      patterns:
      - '*'
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: monthly
  cooldown:
    default-days: 7
  open-pull-requests-limit: 1
  groups:
    all-others:
      patterns:
      - '*'
- package-ecosystem: docker
  directory: /
  schedule:
    interval: monthly
  cooldown:
    default-days: 7
  open-pull-requests-limit: 1
  groups:
    all-others:
      patterns:
      - '*'
