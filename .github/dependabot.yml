version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 2
    groups:
      dev-deps-nonmajor:
        dependency-type: development
        update-types:
          - minor
          - patch
      prod-deps-nonmajor:
        dependency-type: production
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 1
    groups:
      all-others:
        patterns:
          - '*'
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 1
    groups:
      all-others:
        patterns:
          - '*'
