name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke test (stdio initialize + tools/list)
        run: npm run smoke

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: High/critical vulnerabilities only
        run: npm audit --audit-level=high

  e2e:
    name: E2E (GreenMail · IMAP/SMTP reales)
    runs-on: ubuntu-latest
    services:
      greenmail:
        image: greenmail/standalone:2.1.0
        ports:
          - 3025:3025
          - 3143:3143
        env:
          GREENMAIL_OPTS: -Dgreenmail.setup.test.all -Dgreenmail.hostname=0.0.0.0 -Dgreenmail.auth.disabled
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Wait for GreenMail IMAP (127.0.0.1:3143)
        run: |
          for i in $(seq 1 30); do
            if (exec 3<>/dev/tcp/127.0.0.1/3143) 2>/dev/null; then
              echo "GreenMail listo"; exec 3>&-; exit 0
            fi
            sleep 1
          done
          echo "GreenMail no respondió en :3143"; exit 1
      - name: E2E full cycle (send → read → flag → move → delete)
        env:
          GREENMAIL_HOST: 127.0.0.1
          GREENMAIL_IMAP_PORT: "3143"
          GREENMAIL_SMTP_PORT: "3025"
        run: npm run test:e2e

  docker-build:
    name: Docker build smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: Build image (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: false
          tags: protonmail-mcp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
