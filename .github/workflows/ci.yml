name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify (Node ${{ matrix.node }})
    runs-on: [self-hosted, ts]
    strategy:
      fail-fast: false
      matrix:
        node: [22]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: latest

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm test

      - name: Coverage
        run: pnpm run coverage

      - name: Verify badge matches coverage
        run: pnpm run coverage:check

      - name: Build
        run: pnpm run build

      - name: Smoke test (stdio initialize + tools/list)
        run: pnpm run smoke

  audit:
    name: Dependency audit
    runs-on: [self-hosted, ts]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      - name: Critical vulnerabilities only
        run: pnpm audit --audit-level=critical

  e2e:
    name: E2E (GreenMail · IMAP/SMTP reales)
    runs-on: [self-hosted, ts]
    continue-on-error: true
    services:
      greenmail:
        image: greenmail/standalone:2.1.0
        ports:
          - 3025:3025
          - 3143:3143
        env:
          GREENMAIL_OPTS: -Dgreenmail.setup.test.all -Dgreenmail.hostname=0.0.0.0 -Dgreenmail.auth.disabled
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      - name: Wait for GreenMail IMAP (127.0.0.1:3143)
        run: |
          if ! docker ps 2>/dev/null | grep -q greenmail; then
            echo "::warning::GreenMail container not detected (Docker service may not work on this runner)"
          fi
          for i in $(seq 1 60); do
            if (exec 3<>/dev/tcp/127.0.0.1/3143) 2>/dev/null; then
              echo "GreenMail listo (attempt $i)"; exec 3>&-; exit 0
            fi
            sleep 2
          done
          echo "::error::GreenMail no respondió en :3143 tras 120s. Verifica que Docker service containers están habilitados en el runner."
          docker ps 2>/dev/null || echo "::warning::Docker not available on runner"
          exit 1
      - name: E2E full cycle (send → read → flag → move → delete)
        env:
          GREENMAIL_HOST: 127.0.0.1
          GREENMAIL_IMAP_PORT: '3143'
          GREENMAIL_SMTP_PORT: '3025'
        run: pnpm run test:e2e

  e2e-pass:
    name: E2E (Pass · GPG + pass CLI reales)
    runs-on: [self-hosted, ts]
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      - name: Install pass + gnupg (E2E)
        run: |
          if ! command -v pass &>/dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y -qq pass gnupg
          fi
      - run: bash scripts/e2e-pass.sh

  docker-build:
    name: Docker build smoke
    runs-on: [self-hosted, ts]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Build image (no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: false
          tags: protonmail-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
