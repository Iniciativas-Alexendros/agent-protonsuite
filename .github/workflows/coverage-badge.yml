# ---------------------------------------------------------------------------
# coverage-badge.yml
#
# Actualiza automáticamente el badge shields.io de cobertura en README.md
# cada vez que se hace push a main. Corre vitest --coverage, extrae el %
# de statements del reporte JSON, reemplaza el badge en README.md y commitea
# el cambio si el badge cambió.
#
# Solo se ejecuta en push a main (no en PR) para no saturar el historial
# con commits de badge en ramas temporales.
# ---------------------------------------------------------------------------
name: Coverage Badge

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permiso de escritura necesario para commitear README.md actualizado
permissions:
  contents: write

concurrency:
  group: coverage-badge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-badge:
    name: Update coverage badge
    runs-on: [self-hosted, ts]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Necesitamos persist-credentials=true para poder hacer git push
          persist-credentials: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Ejecutamos vitest --coverage directamente (evitamos pnpm run coverage
      # que también ejecuta update-coverage-badge.sh, para no duplicar)
      - name: Run vitest with coverage
        run: npx vitest run --coverage

      - name: Update badge in README
        run: bash scripts/update-coverage-badge.sh --skip-run

      - name: Commit and push if badge changed
        run: |
          if git diff --quiet README.md; then
            echo "✅ Badge unchanged — nothing to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            PCT=$(bash scripts/update-coverage-badge.sh --check 2>&1 | grep -oP '[\d.]+%' || echo 'unknown')
            git add README.md
            git commit -m "chore: auto-update coverage badge to ${PCT}"
            git push --force-with-lease
          fi
