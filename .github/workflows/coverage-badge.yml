# ---------------------------------------------------------------------------
# coverage-badge.yml
#
# Genera coverage-badge.json con vitest --coverage y lo despliega en la
# branch gh-pages. El README.md referencia un shields.io endpoint badge que
# lee el JSON desde raw.githubusercontent.com — cero commits a main.
#
# Se ejecuta en push a main y manualmente con workflow_dispatch.
# ---------------------------------------------------------------------------
name: Coverage Badge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: coverage-badge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-badge:
    name: Update coverage badge
    runs-on: [self-hosted, ts]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run vitest with coverage
        run: npx vitest run --coverage

      - name: Generate badge JSON
        run: bash scripts/update-coverage-badge.sh --skip-run

      - name: Deploy badge to gh-pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./coverage
          destination_dir: ./
          keep_files: false
          commit_message: "chore: auto-update coverage badge"
