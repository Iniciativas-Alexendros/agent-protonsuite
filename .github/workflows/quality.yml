name: Quality

# Homogeneización del repo consumiendo plantillas reusables de Iniciativas-Alexendros/plantillas.
#   - detect:       descubre el stack del repo (composite action).
#   - lint:         gitleaks + markdownlint + lychee + actionlint/zizmor + linters de stack.
#   - supply-chain: SBOM (CycloneDX/syft) + attest-build-provenance.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Techo de permisos del workflow. Un job NO puede conceder a un reusable más de
# lo que figura aquí, así que el techo incluye lo que exigen los reusables
# (_lib-lint-aggregate: checks/security-events; _lib-supply-chain: id-token/attestations).
# Cada job restringe a lo que realmente usa (mínimo privilegio efectivo).
permissions:
  contents: read
  checks: write
  pull-requests: read
  security-events: write
  id-token: write
  attestations: write

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Detección de stack · composite action en plantillas.
  # Requiere checkout previo (mismo @v6 que el resto del repo).
  # ────────────────────────────────────────────────────────────────────
  detect:
    name: Detect stack
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_ts: ${{ steps.detect.outputs.has_ts }}
      has_rust: ${{ steps.detect.outputs.has_rust }}
      has_python: ${{ steps.detect.outputs.has_python }}
      has_docker: ${{ steps.detect.outputs.has_docker }}
      has_markdown: ${{ steps.detect.outputs.has_markdown }}
      has_shell: ${{ steps.detect.outputs.has_shell }}
      is_monorepo: ${{ steps.detect.outputs.is_monorepo }}
      is_docs_only: ${{ steps.detect.outputs.is_docs_only }}
      languages: ${{ steps.detect.outputs.languages }}
      release_type: ${{ steps.detect.outputs.release_type }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: detect
        uses: Iniciativas-Alexendros/plantillas/.github/actions/detect-stack@main

  # ────────────────────────────────────────────────────────────────────
  # Lint agregado · reusable. gitleaks (siempre) + markdown/link + linters
  # condicionados a los has_* que devuelve detect.
  # ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint aggregate
    needs: detect
    uses: Iniciativas-Alexendros/plantillas/.github/workflows/_lib-lint-aggregate.yml@main
    # El reusable declara checks:write + security-events:write + pull-requests:read
    # (reviewdog publica anotaciones). El caller debe concederlos o el run aborta
    # con startup_failure (un job no puede otorgar a un reusable más de lo que tiene).
    permissions:
      contents: read
      checks: write
      pull-requests: read
      security-events: write
    with:
      has_ts: ${{ needs.detect.outputs.has_ts }}
      has_rust: ${{ needs.detect.outputs.has_rust }}
      has_python: ${{ needs.detect.outputs.has_python }}
      has_docker: ${{ needs.detect.outputs.has_docker }}
      has_markdown: ${{ needs.detect.outputs.has_markdown }}
      has_shell: ${{ needs.detect.outputs.has_shell }}

  # ────────────────────────────────────────────────────────────────────
  # Knip — unused dependencies / exports / files detector
  # ────────────────────────────────────────────────────────────────────
  knip:
    name: Knip (unused deps/exports/files)
    runs-on: [self-hosted, ts]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm run knip
  # attest requiere id-token + attestations write y NO funciona en PR de
  # fork (token de solo lectura). Se atestigua solo en push a main del
  # repo propio; en PR se genera SBOM pero no se intenta el attest.
  # ────────────────────────────────────────────────────────────────────
  supply-chain:
    name: Supply chain (SBOM + provenance)
    needs: detect
    uses: Iniciativas-Alexendros/plantillas/.github/workflows/_lib-supply-chain.yml@main
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      enable_sbom: true
      enable_attest: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
