name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Gate semver previo · solo aplica a tags. En push a main pasa-through.
  # Lib en plantillas (Pipelines 2026-05).
  # ────────────────────────────────────────────────────────────────────
  gate-semver:
    name: Validar SemVer (tags)
    if: startsWith(github.ref, 'refs/tags/v')
    uses: Alexendros/plantillas/.github/workflows/_lib-gate-semver.yml@main
    with:
      ref: ${{ github.ref_name }}
      require-stable: false

  # ────────────────────────────────────────────────────────────────────
  # Verificación ligera previa al push (defensa en profundidad).
  # Solo en push a main; en tags ya se asume que main pasó CI.
  # ────────────────────────────────────────────────────────────────────
  verify-light:
    name: Verify (Node 22 · pre-publish)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  publish:
    name: Build & push to GHCR
    needs: [gate-semver, verify-light]
    if: |
      always() &&
      (needs.gate-semver.result == 'success' || needs.gate-semver.result == 'skipped') &&
      (needs.verify-light.result == 'success' || needs.verify-light.result == 'skipped') &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || needs.gate-semver.outputs.is-stable == 'true' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

      - name: Coolify deploy (optional)
        # Despliegue en Coolify tras CI verde (sustituye al webhook de Dokploy, muerto).
        # Dos formas soportadas; configurar UNA en los secrets de la org y VERIFICAR la
        # exacta contra la instancia Coolify 4.1.1 antes de confiar en ella:
        #   a) Webhook por-recurso: secret COOLIFY_DEPLOY_WEBHOOK = URL completa.
        #   b) API por uuid+token:  secrets COOLIFY_URL + COOLIFY_TOKEN + COOLIFY_RESOURCE_UUID.
        # No-fatal: si no hay secret configurado, no hace nada (no rompe el release).
        if: github.ref == 'refs/heads/main'
        env:
          WEBHOOK_URL: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_RESOURCE_UUID: ${{ secrets.COOLIFY_RESOURCE_UUID }}
        run: |
          set -o pipefail
          if [ -n "$WEBHOOK_URL" ]; then
            curl -fsSL -X POST "$WEBHOOK_URL" || echo "coolify webhook ping failed (non-fatal)"
          elif [ -n "$COOLIFY_URL" ] && [ -n "$COOLIFY_TOKEN" ] && [ -n "$COOLIFY_RESOURCE_UUID" ]; then
            curl -fsSL -X GET \
              -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
              "${COOLIFY_URL%/}/api/v1/deploy?uuid=${COOLIFY_RESOURCE_UUID}&force=false" \
              || echo "coolify api deploy failed (non-fatal)"
          else
            echo "Coolify deploy no configurado (sin secrets) — se omite."
          fi

      - name: Job summary
        if: always()
        uses: Alexendros/plantillas/.github/actions/job-summary@main
        with:
          title: "Release · ${{ github.ref_name }}"
          status: ${{ job.status }}
          items: |
            trigger=info=${{ github.event_name }} · ${{ github.ref }}
            verify-light=${{ needs.verify-light.result == 'success' && 'ok' || (needs.verify-light.result == 'skipped' && 'info' || 'fail') }}=${{ needs.verify-light.result }}
            semver-gate=${{ needs.gate-semver.result == 'success' && 'ok' || (needs.gate-semver.result == 'skipped' && 'info' || 'fail') }}=${{ needs.gate-semver.result }} (stable=${{ needs.gate-semver.outputs.is-stable }})
            docker=${{ steps.build.outcome == 'success' && 'ok' || 'fail' }}=push=true
          notes: |
            Registry: ghcr.io/${{ github.repository }}.
            `latest` se actualiza en push a main O tag estable (no pre-release).
