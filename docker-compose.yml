# Docker Compose para Proton Suite Agent en modo HTTP (avanzado).
#
# Este stack arranca:
#   - proton-bridge: Proton Mail Bridge headless (imagen community
#                    shenxn/protonmail-bridge) con vault persistido en volumen.
#   - agent:         el MCP server en modo HTTP (Mail + Pass), hablando con
#                    proton-bridge por la red interna proton-net y con acceso
#                    al password store de Pass y claves GPG si se montan como volúmenes.
#
# El servicio se llama proton-bridge (no bridge) para evitar colisión de DNS
# embebido de Docker con otros stacks.
#
# IMPORTANTE: el primer arranque requiere login one-off interactivo en bridge-cli:
#   docker compose up -d proton-bridge
#   docker compose run --rm --entrypoint="" proton-bridge /protonmail/proton-bridge --cli
#   Dentro: login → 2FA → info (copiar "Bridge password") → exit
#   Pegar el bridge password en PROTON_BRIDGE_PASS
#
#   Para configurar Pass JIT:
#     bash pass/gpg-setup.sh
#
# Tras el login inicial, el volumen bridge-data persiste el vault y los
# siguientes arranques son automáticos.
#
# Añade tus labels de Traefik, Caddy o Nginx en la red proxy-network.

services:
  proton-bridge:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    image: protonsuite-agent-bridge:latest
    restart: unless-stopped
    volumes:
      - bridge-data:/root
    expose:
      - '1143'
      - '1025'
    networks:
      - proton-net
    healthcheck:
      test: ['CMD-SHELL', "bash -c 'exec 3<>/dev/tcp/127.0.0.1/1143' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # URL del CLI oficial. Si tu red requiere mirror, sobreescribe aquí.
        # El CLI se descarga en build-time; si falla, el contenedor sigue
        # arrancando y puedes instalarlo manualmente.
        # DRIVE_CLI_URL=https://proton.me/download/drive/cli/linux/proton-drive
    restart: unless-stopped
    depends_on:
      proton-bridge:
        condition: service_healthy
    volumes:
      # Volúmenes opcionales para Pass: montar el password store y claves GPG
      # desde el host. Descomenta si usas PROTON_BRIDGE_PASS_PATH.
      # - pass-data:/home/node/.password-store:ro
      # - gnupg-data:/home/node/.gnupg:ro
      # Persiste el token del CLI oficial (se genera con `proton-drive auth login`
      # una sola vez — ver docs/drive-audit.md).
      - drive-auth-data:/home/node/.config/proton-drive
    environment:
      PROTON_BRIDGE_HOST: proton-bridge
      # 143/25 son los puertos externos del entrypoint de shenxn/protonmail-bridge
      # (socat los reenvía a 127.0.0.1:1143/1025 donde escucha el daemon).
      PROTON_BRIDGE_IMAP_PORT: 143
      PROTON_BRIDGE_SMTP_PORT: 25
      PROTON_BRIDGE_USER: ${PROTON_BRIDGE_USER}
      PROTON_BRIDGE_PASS: ${PROTON_BRIDGE_PASS}
      PROTON_BRIDGE_PASS_PATH: ${PROTON_BRIDGE_PASS_PATH:-}
      PROTON_MAIL_FROM: ${PROTON_MAIL_FROM}
      PROTON_BRIDGE_TLS_INSECURE: 'true'
      NODE_ENV: production
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: 8787
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN}
      MCP_ALLOWED_ORIGINS: ${MCP_ALLOWED_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PROTON_PASS_ENABLED: ${PROTON_PASS_ENABLED:-false}
      # Drive (CLI oficial)
      DRIVE_ENABLED: ${DRIVE_ENABLED:-true}
      DRIVE_CLI_BIN: ${DRIVE_CLI_BIN:-/usr/local/bin/proton-drive}
      DRIVE_STAGING_DIR: ${DRIVE_STAGING_DIR:-/home/node/.proton-drive/staging}
      DRIVE_OBSOLETE_EXTENSIONS: ${DRIVE_OBSOLETE_EXTENSIONS:-.doc,.ppt,.xls,.bmp}
    expose:
      - '8787'
    networks:
      - proton-net
      - proxy-network

volumes:
  bridge-data:
  drive-auth-data:
  # Volúmenes opcionales para Pass
  # pass-data:
  # gnupg-data:

networks:
  proton-net:
    driver: bridge
  proxy-network:
    external: true
